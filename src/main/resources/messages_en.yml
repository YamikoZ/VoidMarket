pshop-help:
  - "&5&lVoidMarket &8» &fPlayer shop commands"
  - "&d/pshop &7Open your player shop menu"
  - "&d/pshop help &7Show this help"
  - "&d/pshop create <price> &7Create a virtual shop from the item in your hand"
  - "&d/pshop browse &7Browse all player shops"
  - "&d/pshop list &7Show your shops"
  - "&d/pshop manage &7Manage price, stock, and removal"
  - "&d/pshop stock <shopId> &7Open stock management"
  - "&d/pshop setprice <shopId> <price> &7Change shop price"
  - "&d/pshop remove <shopId> &7Remove a shop and return stock"
shop-help:
  - "&5&lVoidMarket &8» &fHow to create a player shop"
  - "&71. Hold the item you want to sell"
  - "&72. Type &d/pshop create <price>"
  - "&73. Confirm in the GUI"
  - "&74. Add more stock in &d/pshop manage"
  - "&75. Other players can buy from &d/pshop browse"
  - "&7Example: &d/pshop create 250"
market-help:
  - "&5&lVoidMarket &8» &fMarket commands"
  - "&d/market &7Open the global market GUI"
  - "&d/market help &7Show this help"
  - "&d/market buy <item> <amount> &7Buy from the market"
  - "&d/market sell <item> <amount> &7Sell to the market"
  - "&d/market price <item> &7Check buy/sell price and stock"
  - "&d/market prices &7Open the price list GUI"
  - "&d/market storage &7Show active storage type"
  - "&d/market admin &7Open admin GUI"
  - "&d/market reload &7Reload config and messages"
  - "&d/market migrate &7Run/check schema migration"
  - "&d/market backup &7Run/check database backup"
