name: VoidMarket
version: 1.0.0
main: com.voidsmp.voidmarket.VoidMarketPlugin
api-version: '1.21'
authors: [VoidSMP]
description: Dynamic economy, global market, and virtual player shops for VoidSMP.
depend: [Vault]
softdepend: [PlaceholderAPI, LuckPerms, Essentials]
commands:
  market:
    description: Open and manage the global market.
    usage: /market help
    permission: voidmarket.use
  pshop:
    description: Virtual player shop commands.
    usage: /pshop help
    permission: voidmarket.use
permissions:
  voidmarket.use: {default: true}
  voidmarket.buy: {default: true}
  voidmarket.sell: {default: true}
  voidmarket.shop.create: {default: true}
  voidmarket.shop.remove: {default: true}
  voidmarket.shop.limit.default: {default: true}
  voidmarket.shop.limit.vip: {default: false}
  voidmarket.shop.limit.svip: {default: false}
  voidmarket.shop.limit.staff: {default: op}
  voidmarket.admin: {default: op}
  voidmarket.reload: {default: op}
  voidmarket.bypass: {default: op}
